name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Set up npm
        run: |
          cd "$RUNNER_TEMP"
          npm install --global npm@11.14.1
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check main and preload
        run: npx tsc -p tsconfig.node.json --noEmit

      - name: Build
        run: npm run build
