[default]
description = "Allow whats app commands"
permissions = [
  "allow-get-build-info",
  "allow-get-settings",
  "allow-set-settings",
  "allow-report-unread",
  "allow-report-disconnected",
  "allow-notify-message",
  "allow-preview-notification",
  "allow-preview-sound",
  "allow-open-external",
]

[[permission]]
identifier = "allow-get-build-info"
description = "Read current build metadata"
commands.allow = ["get_build_info"]

[[permission]]
identifier = "allow-get-settings"
description = "Read current settings"
commands.allow = ["get_settings"]

[[permission]]
identifier = "allow-set-settings"
description = "Write settings"
commands.allow = ["set_settings"]

[[permission]]
identifier = "allow-report-unread"
description = "Report unread count from the page"
commands.allow = ["report_unread"]

[[permission]]
identifier = "allow-report-disconnected"
description = "Report disconnected state from the page"
commands.allow = ["report_disconnected"]

[[permission]]
identifier = "allow-notify-message"
description = "Fire a native notification for a new message"
commands.allow = ["notify_message"]

[[permission]]
identifier = "allow-preview-notification"
description = "Fire a preview notification from settings"
commands.allow = ["preview_notification"]

[[permission]]
identifier = "allow-preview-sound"
description = "Fire a preview notification with sound from settings"
commands.allow = ["preview_sound"]

[[permission]]
identifier = "allow-open-external"
description = "Open a URL in the system default browser"
commands.allow = ["open_external"]
