appId: app.whats.desktop
productName: whats
directories:
  output: dist
linux:
  target: deb
  category: Network;InstantMessaging
  icon: resources/icons
  desktop:
    entry:
      StartupWMClass: whats
  executableArgs:
    - --ozone-platform-hint=auto
deb:
  depends:
    - libnotify-bin
    - pulseaudio-utils
extraResources:
  - from: resources/icons
    to: icons
